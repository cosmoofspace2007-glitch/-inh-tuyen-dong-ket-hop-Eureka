spring:
    application:
        name: api-gateway
    cloud:
      gateway:
        server:
          webmvc:
            routes:
              - id: products-service
                uri: lb://products-service
                predicates:
                  - Path = /api/v1/products/**

server:
  port: 8080

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka